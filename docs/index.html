<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário com Feriados</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .calendar {
            width: 460px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== HEADER ===== */
        .calendar-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 28px 24px;
            text-align: center;
            position: relative;
        }

        .calendar-header h2 {
            color: #fff;
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .calendar-header .year {
            color: rgba(255,255,255,0.7);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            position: absolute;
            top: 50%;
            left: 0; right: 0;
            transform: translateY(-50%);
            padding: 0 12px;
            pointer-events: none;
        }

        .nav-btn {
            pointer-events: all;
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.35);
            transform: scale(1.1);
        }

        /* ===== BODY ===== */
        .calendar-body {
            padding: 20px 18px 16px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 10px;
        }

        .weekdays span {
            text-align: center;
            color: rgba(255,255,255,0.45);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 0;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            font-size: 0.95rem;
            color: rgba(255,255,255,0.85);
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
        }

        .day:hover:not(.empty):not(.today) {
            background: rgba(255,255,255,0.1);
            transform: scale(1.1);
        }

        .day.empty {
            cursor: default;
        }

        .day.today {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
            transform: scale(1.05);
        }

        .day.today:hover {
            transform: scale(1.15);
        }

        .day.other-month {
            color: rgba(255,255,255,0.2);
        }

        .day.weekend {
            color: #f093fb;
        }

        .day.today.weekend {
            color: #fff;
        }

        /* ===== FERIADO ===== */
        .day.holiday {
            background: rgba(255, 71, 87, 0.2);
            color: #ff6b81;
            font-weight: 700;
            border: 1px solid rgba(255, 71, 87, 0.4);
        }

        .day.holiday::after {
            content: '🔴';
            position: absolute;
            bottom: 2px;
            font-size: 0.35rem;
        }

        .day.holiday:hover {
            background: rgba(255, 71, 87, 0.35);
            transform: scale(1.1);
        }

        .day.today.holiday {
            background: linear-gradient(135deg, #ff4757, #ff6b81);
            color: #fff;
            box-shadow: 0 4px 20px rgba(255, 71, 87, 0.5);
        }

        .day.today.holiday::after {
            content: '🎉';
            font-size: 0.5rem;
            bottom: 1px;
        }

        /* ===== TOOLTIP ===== */
        .day .tooltip {
            visibility: hidden;
            opacity: 0;
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 40, 0.95);
            color: #fff;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.75rem;
            white-space: nowrap;
            z-index: 100;
            border: 1px solid rgba(255, 71, 87, 0.4);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .day .tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: rgba(20, 20, 40, 0.95);
        }

        .day:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        /* ===== LEGENDA ===== */
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 12px 24px 8px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.6);
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.today-dot {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .legend-dot.holiday-dot {
            background: rgba(255, 71, 87, 0.6);
            border: 1px solid rgba(255, 71, 87, 0.8);
        }

        .legend-dot.weekend-dot {
            background: #f093fb;
        }

        /* ===== LISTA DE FERIADOS ===== */
        .holidays-list {
            padding: 8px 24px 20px;
        }

        .holidays-list h3 {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 500;
        }

        .holiday-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: rgba(255, 71, 87, 0.08);
            border-radius: 10px;
            border-left: 3px solid #ff4757;
            transition: all 0.2s ease;
        }

        .holiday-item:hover {
            background: rgba(255, 71, 87, 0.15);
            transform: translateX(4px);
        }

        .holiday-date {
            color: #ff6b81;
            font-size: 0.8rem;
            font-weight: 700;
            min-width: 50px;
        }

        .holiday-name {
            color: rgba(255,255,255,0.8);
            font-size: 0.8rem;
        }

        .holiday-emoji {
            font-size: 1.1rem;
        }

        /* ===== FOOTER ===== */
        .calendar-footer {
            padding: 0 24px 20px;
            text-align: center;
        }

        .today-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
            padding: 10px 28px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .today-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
        }

        /* ===== RESPONSIVO ===== */
        @media (max-width: 480px) {
            .calendar { width: 95vw; }
            .calendar-header h2 { font-size: 1.3rem; }
            .day { font-size: 0.85rem; }
            .legend { gap: 12px; }
        }
    </style>
</head>
<body>

<div class="calendar">
    <div class="calendar-header">
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn">◀</button>
            <button class="nav-btn" id="nextBtn">▶</button>
        </div>
        <h2 id="monthName"></h2>
        <div class="year" id="yearName"></div>
    </div>

    <div class="calendar-body">
        <div class="weekdays">
            <span>Dom</span><span>Seg</span><span>Ter</span>
            <span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
        </div>
        <div class="days" id="daysGrid"></div>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot today-dot"></div>
            <span>Hoje</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot holiday-dot"></div>
            <span>Feriado</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot weekend-dot"></div>
            <span>Fim de semana</span>
        </div>
    </div>

    <div class="holidays-list" id="holidaysList"></div>

    <div class="calendar-footer">
        <button class="today-btn" id="todayBtn">📅 Hoje</button>
    </div>
</div>

<script>
    const monthNames = [
        'Janeiro', 'Fevereiro', 'Março', 'Abril',
        'Maio', 'Junho', 'Julho', 'Agosto',
        'Setembro', 'Outubro', 'Novembro', 'Dezembro'
    ];

    let currentDate = new Date();
    let viewMonth = currentDate.getMonth();
    let viewYear = currentDate.getFullYear();

    // ===== CÁLCULO DA PÁSCOA (Algoritmo de Meeus) =====
    function calcEaster(year) {
        const a = year % 19;
        const b = Math.floor(year / 100);
        const c = year % 100;
        const d = Math.floor(b / 4);
        const e = b % 4;
        const f = Math.floor((b + 8) / 25);
        const g = Math.floor((b - f + 1) / 3);
        const h = (19 * a + b - d - g + 15) % 30;
        const i = Math.floor(c / 4);
        const k = c % 4;
        const l = (32 + 2 * e + 2 * i - h - k) % 7;
        const m = Math.floor((a + 11 * h + 22 * l) / 451);
        const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
        const day = ((h + l - 7 * m + 114) % 31) + 1;
        return new Date(year, month, day);
    }

    // ===== FERIADOS NACIONAIS =====
    function getHolidays(year) {
        const easter = calcEaster(year);

        // Função auxiliar para criar data a partir da Páscoa
        function addDays(date, days) {
            const d = new Date(date);
            d.setDate(d.getDate() + days);
            return d;
        }

        const holidays = {};

        function addHoliday(date, name, emoji) {
            const key = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
            holidays[key] = { name, emoji, date };
        }

        // Feriados fixos
        addHoliday(new Date(year, 0, 1), 'Confraternização Universal', '🎆');
        addHoliday(new Date(year, 3, 21), 'Tiradentes', '🇧🇷');
        addHoliday(new Date(year, 4, 1), 'Dia do Trabalho', '⚒️');
        addHoliday(new Date(year, 8, 7), 'Independência do Brasil', '🇧🇷');
        addHoliday(new Date(year, 9, 12), 'Nossa Senhora Aparecida', '🙏');
        addHoliday(new Date(year, 10, 2), 'Finados', '🕯️');
        addHoliday(new Date(year, 10, 15), 'Proclamação da República', '🇧🇷');
        addHoliday(new Date(year, 10, 20), 'Dia da Consciência Negra', '✊');
        addHoliday(new Date(year, 11, 25), 'Natal', '🎄');

        // Feriados móveis (baseados na Páscoa)
        addHoliday(addDays(easter, -47), 'Carnaval (Segunda)', '🎭');
        addHoliday(addDays(easter, -46), 'Carnaval (Terça)', '🎭');
        addHoliday(addDays(easter, -45), 'Quarta-feira de Cinzas', '✝️');
        addHoliday(addDays(easter, -2), 'Sexta-feira Santa', '✝️');
        addHoliday(easter, 'Páscoa', '🐣');
        addHoliday(addDays(easter, 60), 'Corpus Christi', '⛪');

        return holidays;
    }

    // ===== RENDERIZAR CALENDÁRIO =====
    function renderCalendar() {
        const monthName = document.getElementById('monthName');
        const yearName = document.getElementById('yearName');
        const daysGrid = document.getElementById('daysGrid');
        const holidaysList = document.getElementById('holidaysList');

        monthName.textContent = monthNames[viewMonth];
        yearName.textContent = viewYear;

        daysGrid.innerHTML = '';

        const holidays = getHolidays(viewYear);
        const firstDay = new Date(viewYear, viewMonth, 1).getDay();
        const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
        const daysInPrevMonth = new Date(viewYear, viewMonth, 0).getDate();

        // Dias do mês anterior
        for (let i = firstDay - 1; i >= 0; i--) {
            const dayEl = document.createElement('div');
            dayEl.classList.add('day', 'other-month');
            dayEl.textContent = daysInPrevMonth - i;
            daysGrid.appendChild(dayEl);
        }

        // Dias do mês atual
        for (let d = 1; d <= daysInMonth; d++) {
            const dayEl = document.createElement('div');
            dayEl.classList.add('day');
            dayEl.textContent = d;

            const dayOfWeek = new Date(viewYear, viewMonth, d).getDay();
            if (dayOfWeek === 0 || dayOfWeek === 6) {
                dayEl.classList.add('weekend');
            }

            // Verificar feriado
            const key = `${viewYear}-${viewMonth}-${d}`;
            if (holidays[key]) {
                dayEl.classList.add('holiday');
                const tooltip = document.createElement('span');
                tooltip.classList.add('tooltip');
                tooltip.textContent = `${holidays[key].emoji} ${holidays[key].name}`;
                dayEl.appendChild(tooltip);
            }

            // Verificar se é hoje
            if (
                d === currentDate.getDate() &&
                viewMonth === currentDate.getMonth() &&
                viewYear === currentDate.getFullYear()
            ) {
                dayEl.classList.add('today');
            }

            daysGrid.appendChild(dayEl);
        }

        // Dias do próximo mês
        const totalCells = daysGrid.children.length;
        const remaining = (Math.ceil(totalCells / 7) * 7) - totalCells;
        for (let i = 1; i <= remaining; i++) {
            const dayEl = document.createElement('div');
            dayEl.classList.add('day', 'other-month');
            dayEl.textContent = i;
            daysGrid.appendChild(dayEl);
        }

        // ===== LISTA DE FERIADOS DO MÊS =====
        const monthHolidays = Object.values(holidays).filter(h =>
            h.date.getMonth() === viewMonth
        ).sort((a, b) => a.date.getDate() - b.date.getDate());

        if (monthHolidays.length > 0) {
            let html = '<h3>🎉 Feriados do mês</h3>';
            monthHolidays.forEach(h => {
                const dia = String(h.date.getDate()).padStart(2, '0');
                html += `
                    <div class="holiday-item">
                        <span class="holiday-emoji">${h.emoji}</span>
                        <span class="holiday-date">${dia}/${String(h.date.getMonth()+1).padStart(2,'0')}</span>
                        <span class="holiday-name">${h.name}</span>
                    </div>
                `;
            });
            holidaysList.innerHTML = html;
            holidaysList.style.display = 'block';
        } else {
            holidaysList.innerHTML = '<h3>📭 Sem feriados neste mês</h3>';
            holidaysList.style.display = 'block';
        }
    }

    // ===== EVENTOS =====
    document.getElementById('prevBtn').addEventListener('click', () => {
        viewMonth--;
        if (viewMonth < 0) { viewMonth = 11; viewYear--; }
        renderCalendar();
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
        viewMonth++;
        if (viewMonth > 11) { viewMonth = 0; viewYear++; }
        renderCalendar();
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
        viewMonth = currentDate.getMonth();
        viewYear = currentDate.getFullYear();
        renderCalendar();
    });

    renderCalendar();
</script>

</body>
</html>
